            schema:
              type: object
              properties:
                dist:
                  type: string
                  description: Distribution identifier
                arch:
                  type: string
                  description: Architecture
                lang:
                  type: string
                  description: Language
                authorized_key:
                  type: array
                  items: {}
                  description: One or more SSH key fingerprints (optional)
              required:
              - dist
              - arch
              - lang
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinuxActivateResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: linuxDeactivate
      summary: Deactivate linux installation
      description: Deactivate Linux installation
      tags:
