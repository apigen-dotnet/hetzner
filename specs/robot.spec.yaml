            application/json:
              schema:
                $ref: '#/components/schemas/LinuxGetLastResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /boot/{server_number}/vnc:
    get:
      operationId: vncGet
      summary: Get vnc data
      description: Query boot options for the VNC installation
      tags:
      - boot
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
        description: Server main ip
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VncGetResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: vncActivate
      summary: Activate vnc installation
      description: Activate VNC installation
      tags:
