      tags:
      - server
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                server_name:
                  type: string
                  description: Servername
              required:
              - server_name
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServernameUpdateResponse'
        default:
          description: Error
