        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                dist:
                  type: string
                  description: Distribution identifier
                arch:
                  type: string
                  description: Architecture
                lang:
                  type: string
                  description: Language
              required:
              - dist
              - arch
              - lang
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VncActivateResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: vncDeactivate
      summary: Deactivate vnc installation
      description: Deactivate VNC installation
      tags:
      - boot
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VncDeactivateResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /boot/{server_number}/windows:
    get:
      operationId: windowsGet
      summary: Get windows data
      description: Query boot options for the windows installation
      tags:
      - boot
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WindowsGetResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: windowsActivate
      summary: Activate windows installation
      description: Activate Windows installation. You need to order the Windows addon for the server via the Robot webpanel
        first. After a reboot, the installation will start, and all data on the server will be deleted.
      tags:
      - boot
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WindowsActivateResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: windowsDeactivate
      summary: Deactivate windows installation
      description: Deactivate Windows installation
      tags:
      - boot
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WindowsDeactivateResponse'
        default:
          description: Error
          content:
