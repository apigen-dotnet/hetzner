openapi: 3.0.3
info:
  title: Hetzner Robot Webservice
  version: 1.0.0
  description: 'Reverse-engineered OpenAPI specification for the Hetzner Robot

    Webservice (https://robot-ws.your-server.de).


    Paths, HTTP verbs, path parameters, query parameters and request

    bodies are derived from Hetzner''s official PHP reference client.

    Response schemas and endpoint descriptions are derived from

    Hetzner''s official HTML reference documentation.


    Authentication is HTTP Basic using a Web Service user created in

    the Robot panel (Settings → Web service and app settings). Note

    that this is a separate user account from the main Robot login.

    '
  license:
    name: Hetzner Robot Webservice documentation
    url: https://robot.hetzner.com/doc/webservice/en.html
servers:
- url: https://robot-ws.your-server.de
security:
- BasicAuth: []
paths:
  /failover/{ip}:
    get:
      operationId: failoverGet
      summary: Get failover
      description: Query specific failover IP address data
      tags:
      - failover
      parameters:
      - name: ip
        in: path
        required: true
        schema:
          type: string
        description: Failover ip address
      - name: query
        in: query
        required: false
        description: Additional ad-hoc query parameters as accepted by Hetzner.
        schema:
          type: object
          additionalProperties: true
        style: form
        explode: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailoverGetResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: failoverRoute
      summary: Route failover
      description: Switch routing of failover IP address to another server
      tags:
      - failover
      parameters:
      - name: ip
        in: path
        required: true
        schema:
          type: string
        description: Failover ip address
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                active_server_ip:
                  type: string
                  description: Target server ip address
              required:
              - active_server_ip
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailoverRouteResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: failoverDelete
      summary: Delete failover routing
      description: Delete the routing of a failover IP
      tags:
      - failover
      parameters:
      - name: ip
        in: path
        required: true
        schema:
          type: string
        description: Failover IP address
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailoverDeleteResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /failover:
    get:
      operationId: failoverGetAll
      summary: Get failover (collection)
      description: Query failover data for all servers
      tags:
      - failover
      parameters:
      - name: query
        in: query
        required: false
        description: Additional ad-hoc query parameters as accepted by Hetzner.
        schema:
          type: object
          additionalProperties: true
        style: form
        explode: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FailoverGetAllResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /reset/{server_number}:
    get:
      operationId: resetGet
      summary: Get server reset
      description: Query reset options for a specific server
      tags:
      - reset
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetGetResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: resetExecute
      summary: Execute server reset
      description: Execute reset on specific server
      tags:
      - reset
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: Reset type
              required:
              - type
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetExecuteResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /reset:
    get:
      operationId: resetGetAll
      summary: Get server reset (collection)
      description: Query reset options for all servers
      tags:
      - reset
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResetGetAllResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /boot/{server_number}:
    get:
      operationId: bootGet
      summary: Get current boot config
      description: Query the current boot configuration status for a server. There can be only one configuration active at
        any time for one server.
      tags:
      - boot
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootGetResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /boot/{server_number}/rescue:
    get:
      operationId: rescueGet
      summary: Get server rescue data
      description: Query boot options for the Rescue System
      tags:
      - boot
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RescueGetResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: rescueActivate
      summary: Activate rescue system for a server
      description: Activate Rescue System
      tags:
      - boot
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                os:
                  type: string
                  description: Operating system to boot
                arch:
                  type: string
                  description: Architecture of operating system
                authorized_key:
                  type: array
                  items: {}
                  description: One or more SSH key fingerprints (optional)
                keyboard:
                  type: string
                  description: 'Desired keyboard layout (optional, default: us)'
              required:
              - os
              - arch
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RescueActivateResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: rescueDeactivate
      summary: Deactivate rescue system for a server
      description: Deactivate Rescue System
      tags:
      - boot
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RescueDeactivateResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /boot/{server_number}/rescue/last:
    get:
      operationId: rescueGetLast
      summary: Get data of last rescue system activation
      description: Show data of last rescue activation
      tags:
      - boot
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
