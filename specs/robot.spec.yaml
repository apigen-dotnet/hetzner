  /ip:
    get:
      operationId: ipGetByServerIp
      summary: Get all single ips of specific server
      description: Query list of all single IP addresses
      tags:
      - ip
      parameters:
      - name: server_ip
        in: query
        required: false
        schema:
          type: string
        description: Server main ip
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IpGetByServerIpResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /ip/{ip}:
    get:
      operationId: ipGet
      summary: Get ip
      description: Query data for a specific IP address
      tags:
      - ip
      parameters:
      - name: ip
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpGetResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: ipSetTrafficWarningLimits
      summary: Set traffic warning limits for single ip
      description: Update traffic warning options for an IP address
      tags:
      - ip
      parameters:
      - name: ip
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                traffic_hourly:
                  type: integer
                  description: Hourly traffic in megabyte
                traffic_daily:
                  type: integer
                  description: Daily traffic in megabyte
                traffic_monthly:
                  type: integer
                  description: Montly traffic in gigabyte
              required:
              - traffic_hourly
              - traffic_daily
              - traffic_monthly
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpSetTrafficWarningLimitsResponse'
