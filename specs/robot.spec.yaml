      operationId: wolSend
      summary: Send Wake On Lan packet to server
      description: Send Wake On LAN packet to server
      tags:
      - wol
      parameters:
      - name: server_number
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WolSendResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /rdns/{ip}:
    get:
      operationId: rdnsGet
      summary: Get rdns entry for ip
      description: Query the current reverse DNS entry for one IP address
      tags:
      - rdns
      parameters:
      - name: ip
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RdnsGetResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: rdnsCreate
      summary: Create rdns entry for ip
      description: Create new reverse DNS entry for one IP address. Once the reverse DNS entry is successfully created, the
        status code 201 CREATED is returned.
      tags:
      - rdns
      parameters:
      - name: ip
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                ptr:
                  type: string
                  description: PTR record
              required:
              - ptr
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RdnsCreateResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: rdnsUpdate
      summary: Update rdns entry for ip
      description: Update/create a reverse DNS entry for one IP. Once the reverse DNS entry is successfully created, the status
        code is set to 201 created. On succesfull updates, the status code is 200 OK.
      tags:
      - rdns
      parameters:
      - name: ip
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                ptr:
                  type: string
                  description: PTR record
              required:
              - ptr
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RdnsUpdateResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: rdnsDelete
      summary: Delete rdns entry for ip
      description: Delete reverse DNS entry for one IP
      tags:
      - rdns
      parameters:
      - name: ip
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Success
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
